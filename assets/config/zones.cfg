# Zone Definitions
# 4 zones that cycle: Worker -> Warrior -> Planetoid -> Void -> Worker (harder) -> ...
# Each row: name planetoids warriors workers crystals warSpeed wkrSpeed siniSpeed startPieces aggression

[zones]
# name       plan war wkr crys warSpd wkrSpd siniSpd startPcs aggr
# Scaled for compact 1024x1024 world. Original ROM had 65536x65536 coordinates.
# Workers must be few — in original, vast distances slowed Sinistar assembly.
# ROM build thresholds ($4FAA) also gate piece creation: multiple deliveries per piece.
WORKER         20   2   5   15     80     60     150        0  0.05
WARRIOR        20   5   8   12    100     80     200        3  0.20
PLANETOID      18   4   7   10    110     90     230        5  0.15
VOID           12   7  10    8    130    100     270        7  0.40

